<svg width="360" height="210" xmlns="http://www.w3.org/2000/svg">
<style>
svg {
  font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif;
  font-size: 14px;
  line-height: 21px;
}

#background {
  width: 100%;
  height: 100%;
  fill: #22272e;
  stroke: #444c56;
  stroke-width: 1px;
  rx: 6px;
  ry: 6px;
}

foreignObject {
  width: calc(100% - 42px);
  height: calc(100% - 32px);
}

h2 {
  margin-top: 0;
  margin-bottom: 0.75em;
  line-height: 24px;
  font-size: 16px;
  font-weight: 600;
  color: #cdd9e5;
}

ul {
  list-style: none;
  padding-left: 0;
  margin-top: 0;
  margin-bottom: 0;
}

li {
  display: inline-flex;
  font-size: 12px;
  margin-right: 2ch;
  align-items: center;
  flex-wrap: nowrap;
  transform: translateX(-500%);
  animation: slideIn 2s ease-in-out forwards;
}

@keyframes slideIn {
  to { transform: translateX(0); }
}

.octicon {
  margin-right: 0.5ch;
  vertical-align: top;
}

.progress {
  display: flex;
  height: 8px;
  overflow: hidden;
  background-color: #2d333b;
  border-radius: 6px;
  margin-bottom: 1em;
}

.progress-item {
  outline: 2px solid #22272e;
}

.lang {
  font-weight: 600;
  margin-right: 4px;
  color: #cdd9e5;
}

.percent {
  color: #adbac7;
}
</style>
<g>
<rect x="0" y="0" id="background" />
<foreignObject x="21" y="17" width="318" height="176">
<div xmlns="http://www.w3.org/1999/xhtml">
<h2>Languages Used (By File Size)</h2>
<div><span class="progress">{{ progress }}</span></div>
<ul>{{ lang_list }}</ul>
</div>
</foreignObject>
</g>
</svg>